<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>毛毛日記</title>
<link rel="icon" type="image/png" href="./PLOGO.png">
<link rel="apple-touch-icon" href="./PLOGO.png">
<meta name="apple-mobile-web-app-title" content="毛孩日誌">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4C6B3F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --paper:#EDEEDF;
    --surface:#FFFFFC;
    --ink:#26301F;
    --ink-soft:#68705C;
    --line:#D9DCC5;
    --moss:#4C6B3F;
    --moss-deep:#374F2C;
    --moss-soft:#E1E6D0;
    --clay:#BE7A46;
    --clay-deep:#9C5F34;
    --clay-soft:#F1E2CE;
    --honey:#C99A3E;
    --honey-soft:#F1E4BE;
    --err:#AE4A34;
    --shadow: 0 1px 2px rgba(38,48,31,0.05), 0 8px 24px -12px rgba(38,48,31,0.22);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC', -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--honey-soft);}
  .num{font-family:'IBM Plex Mono', monospace;}
  h1,h2,h3,.display{font-family:'Noto Serif TC', serif;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;}
  a{color:var(--moss-deep);}

  #root{max-width:560px;margin:0 auto;min-height:100vh;min-height:100svh;position:relative;padding-bottom:calc(120px + env(safe-area-inset-bottom));}

  .paw{display:inline-block;width:1em;height:1em;vertical-align:-0.12em;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{width:34px;height:34px;border-radius:10px;object-fit:cover;flex-shrink:0;}
  .brand .logo-fallback{width:34px;height:34px;border-radius:10px;background:var(--moss);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .brand h1{font-size:20px;font-weight:600;margin:0;letter-spacing:.2px;color:var(--ink);}
  .brand .tag{font-size:11px;color:var(--ink-soft);letter-spacing:.4px;}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);}
  .who button{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:12px;padding:0;}
  .profile-trigger{
    display:flex;align-items:center;gap:7px;background:none;border:none;
    color:var(--ink-soft);font-size:13px;font-family:inherit;cursor:pointer;padding:0;
  }
  .profile-trigger:hover{color:var(--moss-deep);}
  .avatar-mini{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--moss-soft);}
  .icon-btn{position:relative;background:none;border:none;font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;color:var(--ink-soft);}
  .invite-badge{position:absolute;top:0px;right:2px;width:10px;height:10px;border-radius:50%;background:var(--clay);border:2px solid var(--paper);}

  .modal-overlay{position:fixed;inset:0;background:rgba(38,48,31,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-card{background:var(--surface);border-radius:20px;padding:22px;max-width:380px;width:100%;box-shadow:var(--shadow);max-height:88vh;overflow-y:auto;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{margin:0;font-size:18px;font-weight:600;color:var(--ink);}
  .modal-close{background:none;border:none;font-size:16px;color:var(--ink-soft);cursor:pointer;padding:2px 6px;}
  .modal-close:hover{color:var(--moss-deep);}

  .avatar-edit{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
  .avatar-preview{width:84px;height:84px;border-radius:50%;background:var(--moss-soft);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:28px;color:var(--moss-deep);font-family:'Noto Serif TC',serif;}
  .avatar-preview img{width:100%;height:100%;object-fit:cover;}
  .color-picker{display:flex;flex-wrap:wrap;gap:10px;padding:2px 0;}
  .color-swatch{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;}
  .color-swatch.selected{border-color:var(--ink);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--ink);}

  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;max-width:420px;margin:0 auto;}
  .auth-hero{margin-bottom:26px;text-align:center;}
  .auth-hero .logo-lg{width:56px;height:56px;border-radius:16px;object-fit:cover;margin-bottom:14px;}
  .auth-hero .eyebrow{font-size:12px;letter-spacing:2px;color:var(--clay-deep);font-weight:600;text-transform:uppercase;margin-bottom:10px;}
  .auth-hero h1{font-size:32px;line-height:1.2;margin:0 0 8px;font-weight:600;}
  .auth-hero p{color:var(--ink-soft);font-size:14px;line-height:1.6;margin:0;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;}
  .field input, .field select{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:15px;color:var(--ink);transition:border-color .15s;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--moss);}
  .btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s, opacity .15s;}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:.55;}
  .btn-primary{background:var(--moss);color:#fff;}
  .btn-primary:hover{background:var(--moss-deep);}
  .btn-ghost{background:transparent;color:var(--ink-soft);text-decoration:underline;padding:8px;font-weight:500;font-size:13.5px;width:auto;}
  .btn-danger{background:var(--err);color:#fff;}
  .auth-toggle{text-align:center;margin-top:16px;font-size:13.5px;color:var(--ink-soft);}
  .auth-toggle a{cursor:pointer;font-weight:600;}
  .auth-err{background:#F8E7E1;border:1px solid #E6BBA9;color:var(--err);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px;line-height:1.5;}
  .auth-ok{background:var(--moss-soft);border:1px solid #B9CBA0;color:var(--moss-deep);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px;line-height:1.5;}

  .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
  .tabbar-inner{max-width:560px;width:100%;display:flex;}
  .tab{flex:1;padding:12px 4px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-soft);font-size:11.5px;font-weight:500;}
  .tab .ic{font-size:19px;}
  .tab.active{color:var(--moss-deep);}

  .page{padding:6px 20px 20px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .section-title{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between;}
  .section-title:first-child{margin-top:4px;}
  .add-fab{background:var(--moss);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0;text-transform:none;}

  .pet-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pet-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow);cursor:pointer;text-align:center;}
  .pet-card:active{transform:scale(0.98);}
  .pet-photo{width:100%;aspect-ratio:1;border-radius:14px;object-fit:cover;background:var(--moss-soft);margin-bottom:8px;}
  .pet-photo-fallback{width:100%;aspect-ratio:1;border-radius:14px;background:var(--moss-soft);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:8px;}
  .pet-name{font-size:14.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:5px;}
  .pet-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
  .pet-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .pet-owner-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-soft);margin-top:6px;background:var(--paper);padding:2px 8px;border-radius:20px;}
  .pet-owner-tag img{width:13px;height:13px;border-radius:50%;object-fit:cover;}

  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .back-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px;}
  .back-btn:hover{color:var(--moss-deep);}

  .pet-detail-hero{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin-bottom:18px;}
  .pet-detail-photo{width:100%;max-height:260px;border-radius:14px;object-fit:cover;margin-bottom:14px;background:var(--moss-soft);}
  .pet-detail-photo-fallback{width:100%;height:160px;border-radius:14px;background:var(--moss-soft);display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px;}
  .pet-detail-name{font-size:24px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:8px;}
  .pet-detail-sub{font-size:13px;color:var(--ink-soft);margin-bottom:12px;}
  .pet-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .pet-info-item{background:var(--paper);border-radius:12px;padding:9px 12px;}
  .pet-info-item .lbl{font-size:10.5px;color:var(--ink-soft);margin-bottom:2px;}
  .pet-info-item .val{font-size:14px;font-weight:600;color:var(--ink);}
  .pet-note-block{background:var(--paper);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.6;color:var(--ink);margin-bottom:10px;white-space:pre-wrap;}
  .pet-note-block .lbl{font-size:10.5px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;letter-spacing:.5px;}
  .pet-detail-actions{display:flex;gap:10px;margin-top:14px;}
  .pet-detail-actions button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);}
  .pet-detail-actions button.edit{color:var(--moss-deep);border-color:var(--moss-soft);}
  .pet-detail-actions button.del{color:var(--err);}

  .form-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0;}
  .grid2 > *{min-width:0;}
  @media (max-width:430px){ .grid2{grid-template-columns:1fr;} .pet-grid{grid-template-columns:1fr 1fr;} }
  .field.compact{margin-bottom:12px;}
  .field.compact label{font-size:11.5px;}
  .field.compact input, .field.compact select{padding:10px 11px;font-size:14px;}
  textarea{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:15px;color:var(--ink);resize:vertical;min-height:52px;}
  textarea:focus{outline:none;border-color:var(--moss);}

  .photo-box{border:1.5px dashed var(--line);border-radius:14px;padding:14px;text-align:center;cursor:pointer;background:#FBFAF3;position:relative;overflow:hidden;}
  .photo-box.has-img{border-style:solid;padding:0;}
  .photo-box img{width:100%;max-height:220px;object-fit:cover;display:block;border-radius:12px;}
  .photo-box .placeholder{color:var(--ink-soft);font-size:13px;padding:16px 0;}
  .photo-box .placeholder .ic{font-size:26px;display:block;margin-bottom:6px;}
  .photo-remove{position:absolute;top:8px;right:8px;background:rgba(38,48,31,.65);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;}

  .submit-row{margin-top:16px;}
  .toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;box-shadow:var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:86%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .feed-quick{display:flex;gap:8px;margin-bottom:14px;}
  .feed-quick select{flex:1;padding:11px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:14px;color:var(--ink);}

  .day-group{margin-bottom:18px;}
  .day-label{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-bottom:8px;letter-spacing:.3px;}
  .feed-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;}
  .feed-icon{width:46px;height:46px;border-radius:12px;background:var(--clay-soft);color:var(--clay-deep);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .feed-body{flex:1;min-width:0;}
  .feed-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:var(--honey-soft);color:#8A6A1E;}
  .time-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--paper);color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .pet-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--moss-soft);color:var(--moss-deep);}
  .type-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;}
  .type-tag.type-meal{background:var(--clay-soft);color:var(--clay-deep);}
  .type-tag.type-vet{background:#E4D9F0;color:#5A3E82;}
  .type-tag.type-med{background:var(--honey-soft);color:#8A6A1E;}
  .type-tag.type-other{background:var(--moss-soft);color:var(--moss-deep);}
  .feed-food{font-size:14.5px;font-weight:500;margin:4px 0 2px;line-height:1.4;}
  .feed-amount{font-size:12px;color:var(--ink-soft);}
  .feed-note{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .feed-photo{width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-top:8px;display:block;}
  .feed-actions{display:flex;justify-content:flex-end;margin-top:6px;}
  .del-btn{background:none;border:none;color:#B7AF9E;font-size:11.5px;cursor:pointer;text-decoration:underline;}
  .del-btn:hover{color:var(--err);}
  .edit-btn{background:none;border:none;color:var(--moss);font-size:11.5px;cursor:pointer;text-decoration:underline;margin-right:14px;}

  .empty-state{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:40px 10px;line-height:1.7;}
  .empty-state .ic{font-size:34px;display:block;margin-bottom:10px;}

  .friends-section{margin-bottom:18px;}
  .friends-section:last-child{margin-bottom:0;}
  .friends-section-title{font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:10px;}
  .invite-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--honey-soft);border-radius:12px;padding:10px 12px;font-size:13px;margin-bottom:8px;}
  .invite-actions{display:flex;gap:6px;flex-shrink:0;}
  .btn-accept{background:var(--moss);color:#fff;border:none;border-radius:16px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .btn-decline{background:none;color:var(--ink-soft);border:1px solid var(--line);border-radius:16px;padding:6px 12px;font-size:12px;cursor:pointer;}
  .friend-row{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
  .friend-row:last-child{border-bottom:none;}
  .friend-row-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .friend-remove{background:none;border:none;color:#B7AF9E;font-size:11.5px;cursor:pointer;text-decoration:underline;flex-shrink:0;}
  .friend-remove:hover{color:var(--err);}
  .history-empty{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:14px 6px;}

  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:14px;box-shadow:var(--shadow);gap:2px;}
  .seg button{flex:1;border:none;background:none;padding:9px 2px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .seg button .ic{font-size:16px;}
  .seg button.active{background:var(--moss);color:#fff;}
  .seg button.active.type-vet{background:var(--clay);}
  .seg button.active.type-med{background:var(--honey);}
  .seg button.active.type-other{background:#7D5BA6;}

  .star-picker{display:flex;gap:4px;}
  .star-btn{background:none;border:none;font-size:24px;line-height:1;cursor:pointer;padding:2px;color:var(--honey);}
  .star-btn:active{transform:scale(0.9);}

  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .cat-chip{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;}
  .cat-chip:hover{border-color:var(--moss);color:var(--moss-deep);}
  .manage-cat-link{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;padding:0;margin-top:8px;}
  .manage-cat-link:hover{color:var(--moss-deep);}
  .manage-cat-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .manage-cat-row:last-child{border-bottom:none;}

  .type-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .type-filter .chip{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .type-filter .chip.active{color:#fff;border-color:transparent;background:var(--ink);}

  .feed-icon.type-meal{background:var(--clay-soft);color:var(--clay-deep);}
  .feed-icon.type-vet{background:#E4D9F0;color:#5A3E82;}
  .feed-icon.type-med{background:var(--honey-soft);color:#8A6A1E;}
  .feed-icon.type-other{background:var(--moss-soft);color:var(--moss-deep);}
  .log-stars{color:var(--honey);font-size:13px;letter-spacing:1px;}
  .log-cost{background:var(--paper);padding:2px 8px;border-radius:8px;font-size:11.5px;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-weight:600;}

  .overview-total{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow);text-align:center;margin-bottom:16px;}
  .overview-total .amt{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600;color:var(--moss-deep);}
  .overview-total .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .range-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
  .range-nav button{background:none;border:none;font-size:19px;color:var(--ink-soft);cursor:pointer;padding:4px 12px;}
  .range-nav button:hover{color:var(--moss-deep);}
  .range-nav .lbl{font-size:14.5px;font-weight:600;color:var(--ink);min-width:110px;text-align:center;}
  .type-bar-row{margin-bottom:12px;}
  .type-bar-row .row-head{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;}
  .type-bar-row .row-head .name{color:var(--ink-soft);font-weight:500;}

const firebaseConfig = {

  measurementId: "G-9MMX4Q7HC3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const INVITE_CODE = "20001126";
const DEFAULT_LOGO = "./PLOGO.png";
const SPECIES = ["狗","貓","兔子","鳥","倉鼠","魚","其他"];
const SPECIES_ICON = {"狗":"🐶","貓":"🐱","兔子":"🐰","鳥":"🐦","倉鼠":"🐹","魚":"🐟","其他":"🐾"};
const PALETTE = ["#4C6B3F","#BE7A46","#C99A3E","#3E7CA6","#7D5BA6","#AE4A34","#5C8A6B","#B65A82"];
const LOG_TYPES = ["meal","vet","med","other"];
const LOG_TYPE_LABEL = {meal:"飲食", vet:"看診", med:"用藥", other:"其他支出"};
const LOG_TYPE_ICON = {meal:"🍖", vet:"🩺", med:"💊", other:"🧾"};
const LEFTOVER_OPTIONS = ["","吃光光","剩一點","剩一半","剩大半","幾乎沒吃"];
const OTHER_CAT_SUGGESTIONS = ["用品","美容","保險","住宿","交通"];

function esc(s){return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nowTimeStr(){
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function nameColor(uid){
  const u = allUsers.find(x=>x.uid===uid);
  if(u && u.color) return u.color;
  let h = 0;
  const s = uid||'';
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) % 997; }
  return PALETTE[h % PALETTE.length];
}
function petColor(petId){
  const p = allPets.find(x=>x.id===petId);
  if(p && p.color) return p.color;
  let h = 0;
  const s = petId||'';
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) % 997; }
  return PALETTE[h % PALETTE.length];
}
async function pickAvailableColor(excludeUid){
  try{
    const snap = await db.collection('users').get();
    const taken = new Set();
    snap.forEach(d=>{ if(d.id!==excludeUid && d.data().color) taken.add(d.data().color); });
    for(const c of PALETTE){ if(!taken.has(c)) return c; }
  }catch(e){ console.error(e); }
  return PALETTE[0];
}
function userName(uid){
  const u = allUsers.find(x=>x.uid===uid);
  return u ? u.name : '某人';
}
function userAvatar(uid){
  const u = allUsers.find(x=>x.uid===uid);
  return u && u.avatar ? u.avatar : null;
}

let currentUser = null;
let currentProfile = null;
let allUsers = [];
let allPets = [];
let allLogs = [];
let myFriends = new Set();
let pendingInvitesToMe = [];
let sentInvites = [];

let unsubProfile=null, unsubUsers=null, unsubOwnPets=null, unsubFriendPets=null, unsubFriends=null, unsubInvites=null, unsubSentInvites=null;
let ownPetsMap = {}, friendPetsMap = {};
let logListenerUnsubs = {}; // petId -> unsub fn
let logsByPet = {}; // petId -> array of logs

let authMode = 'login';
let activeTab = 'pets';
let view = 'list'; // list | detail | addPet | editPet
let selectedPetId = null;
let petPhotoDataUrl = null;
let feedQuickPetId = '';
let addLogType = 'meal';
let editingLog = null;
let mealRatingValue = 0;
let logPhotoDataUrl = null;

const root = document.getElementById('root');

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function logoImgTag(cls){
  return `<img src="${DEFAULT_LOGO}" class="${cls}" onerror="this.outerHTML='<div class=&quot;logo-fallback&quot;>🐾</div>'">`;
}

function isMine(ownerId){ return currentUser && ownerId===currentUser.uid; }
function hasAccess(ownerId){ return isMine(ownerId) || myFriends.has(ownerId); }
function visiblePets(){ return allPets.filter(p=>hasAccess(p.ownerId)); }
function visibleLogsForPet(petId){ return allLogs.filter(f=>f.petId===petId).sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time)); }
function getMyMealHistory(petId){
  const seen = new Set();
  const list = [];
  allLogs.filter(x=>x.type==='meal' && x.petId===petId).forEach(x=>{
    const key = (x.food||'').trim();
    if(!key || seen.has(key)) return;
    seen.add(key);
    list.push(x);
  });
  return list.slice(0, 25);
}
function allCategorySuggestions(){
  const seen = new Set(OTHER_CAT_SUGGESTIONS);
  const list = [...OTHER_CAT_SUGGESTIONS];
  ((currentProfile && currentProfile.customCategories) || []).forEach(c=>{
    if(!seen.has(c)){ seen.add(c); list.push(c); }
  });
  allLogs.filter(x=>x.type==='other' && x.category).forEach(x=>{
    const key = x.category.trim();
    if(!key || seen.has(key)) return;
    seen.add(key); list.push(key);
  });
  return list;
}
function getOtherCategoryHistory(){
  const hidden = new Set((currentProfile && currentProfile.hiddenCategories) || []);
  return allCategorySuggestions().filter(c=>!hidden.has(c)).slice(0, 16);
}
async function addCustomCategory(cat){
  cat = cat.trim();
  if(!cat) return;
  try{
    await db.collection('users').doc(currentUser.uid).update({
      customCategories: firebase.firestore.FieldValue.arrayUnion(cat),
      hiddenCategories: firebase.firestore.FieldValue.arrayRemove(cat)
    });
    if(!currentProfile.customCategories) currentProfile.customCategories = [];
    if(!currentProfile.customCategories.includes(cat)) currentProfile.customCategories.push(cat);
    currentProfile.hiddenCategories = (currentProfile.hiddenCategories||[]).filter(c=>c!==cat);
    toast('已新增類別');
  }catch(e){ toast('操作失敗：'+e.message); }
}
async function removeCategorySuggestion(cat){
  try{
    const isCustom = (currentProfile.customCategories||[]).includes(cat);
    if(isCustom){
      await db.collection('users').doc(currentUser.uid).update({
        customCategories: firebase.firestore.FieldValue.arrayRemove(cat)
      });
      currentProfile.customCategories = (currentProfile.customCategories||[]).filter(c=>c!==cat);
    } else {
      await db.collection('users').doc(currentUser.uid).update({
        hiddenCategories: firebase.firestore.FieldValue.arrayUnion(cat)
      });
      if(!currentProfile.hiddenCategories) currentProfile.hiddenCategories = [];
      currentProfile.hiddenCategories.push(cat);
    }
    toast('已移除這個類別');
  }catch(e){ toast('操作失敗：'+e.message); }
}
function openCategoryManageModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'categoryModalOverlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head"><h3 class="display">管理類別</h3><button class="modal-close" id="closeCategoryModal">✕</button></div>
      <div id="categoryModalBody"></div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('closeCategoryModal').onclick = ()=>{ overlay.remove(); renderLogForm(selectedPetId); };
  overlay.onclick = (ev)=>{ if(ev.target===overlay){ overlay.remove(); renderLogForm(selectedPetId); } };
  renderCategoryModalBody();
}
function renderCategoryModalBody(){
  const body = document.getElementById('categoryModalBody');
  if(!body) return;
  const list = getOtherCategoryHistory();
  body.innerHTML = `
    <div class="friends-section">
      <div class="friends-section-title">目前的類別${list.length? '（'+list.length+'）':''}</div>
      ${list.length===0 ? `<div class="history-empty">還沒有任何類別</div>` : list.map(c=>`
        <div class="manage-cat-row"><span>${esc(c)}</span><button class="friend-remove" data-cat="${esc(c)}">移除</button></div>
      `).join('')}
    </div>
    <div class="friends-section">
      <div class="friends-section-title">新增類別</div>
      <div class="field compact"><input type="text" id="newCategoryInput" placeholder="例如：貓砂、玩具" maxlength="20"></div>
      <button class="btn btn-primary" id="addCategoryBtn">新增</button>
    </div>
  `;
  body.querySelectorAll('.friend-remove').forEach(b=>{
    b.onclick = async ()=>{
      if(!confirm(`確定要移除「${b.dataset.cat}」這個類別嗎？（之前用這個類別記錄過的支出不會被刪除）`)) return;
      await removeCategorySuggestion(b.dataset.cat);
      renderCategoryModalBody();
    };
  });
  document.getElementById('addCategoryBtn').onclick = async ()=>{
    const input = document.getElementById('newCategoryInput');
    const val = input.value.trim();
    if(!val){ toast('請輸入類別名稱'); return; }
    await addCustomCategory(val);
    input.value = '';
    renderCategoryModalBody();
  };
}

auth.onAuthStateChanged(async (user)=>{
  currentUser = user;
  if(user){
    listenProfile(user);
    listenUsers();
    listenFriends();
    listenInvites();
    listenSentInvites();
    listenPets();
  } else {
    [unsubProfile,unsubUsers,unsubOwnPets,unsubFriendPets,unsubFriends,unsubInvites,unsubSentInvites].forEach(u=>u&&u());
    Object.values(logListenerUnsubs).forEach(u=>u&&u());
    unsubProfile=unsubUsers=unsubOwnPets=unsubFriendPets=unsubFriends=unsubInvites=unsubSentInvites=null;
    logListenerUnsubs = {}; logsByPet = {}; ownPetsMap = {}; friendPetsMap = {};
    allUsers=[]; allPets=[]; allLogs=[]; myFriends=new Set(); pendingInvitesToMe=[]; sentInvites=[];
    view='list'; activeTab='pets';
    renderAuth();
  }
});

function listenProfile(user){
  if(unsubProfile) unsubProfile();
  unsubProfile = db.collection('users').doc(user.uid).onSnapshot(doc=>{
    currentProfile = doc.exists ? doc.data() : {name:'未命名', email:user.email};
    if(currentProfile && !currentProfile.color){
      pickAvailableColor(user.uid).then(color=>{
        db.collection('users').doc(user.uid).update({color}).catch(()=>{});
      });
    }
    renderApp();
  }, err=>{
    console.error(err);
    currentProfile = {name:'未命名', email:user.email};
    renderApp();
  });
}
function listenUsers(){
  if(unsubUsers) unsubUsers();
  unsubUsers = db.collection('users').onSnapshot(snap=>{
    allUsers = snap.docs.map(d=>({uid:d.id, ...d.data()}));
    renderCurrentView();
  }, err=>console.error(err));
}
function listenFriends(){
  if(unsubFriends) unsubFriends();
  unsubFriends = db.collection('users').doc(currentUser.uid).collection('friends').onSnapshot(snap=>{
    myFriends = new Set(snap.docs.map(d=>d.id));
    refreshFriendPetsListener();
    renderCurrentView();
  }, err=>console.error(err));
}
function listenInvites(){
  if(unsubInvites) unsubInvites();
  if(!currentUser.email) return;
  unsubInvites = db.collection('invites').where('toEmail','==',currentUser.email).where('status','==','pending')
    .onSnapshot(snap=>{
      pendingInvitesToMe = snap.docs.map(d=>({id:d.id, ...d.data()}));
      const badge = document.getElementById('inviteBadge');
      if(badge) badge.classList.toggle('hidden', pendingInvitesToMe.length===0);
      const overlay = document.getElementById('friendsModalOverlay');
      if(overlay) renderFriendsModalBody();
    }, err=>console.error(err));
}
function listenSentInvites(){
  if(unsubSentInvites) unsubSentInvites();
  unsubSentInvites = db.collection('invites').where('fromUid','==',currentUser.uid).where('status','==','pending')
    .onSnapshot(snap=>{
      sentInvites = snap.docs.map(d=>({id:d.id, ...d.data()}));
      const overlay = document.getElementById('friendsModalOverlay');
      if(overlay) renderFriendsModalBody();
    }, err=>console.error(err));
}

/* Pets are queried in two scoped requests (own + friends') instead of the
   whole collection, because Firestore rejects an entire list query if any
   document it could return fails the security rules. */
function listenPets(){
  if(unsubOwnPets) unsubOwnPets();
  unsubOwnPets = db.collection('pets').where('ownerId','==',currentUser.uid).onSnapshot(snap=>{
    ownPetsMap = {};
    snap.forEach(d=>{ ownPetsMap[d.id] = {id:d.id, ...d.data()}; });
    rebuildAllPets();
  }, err=>{ console.error(err); toast('讀取寵物資料時發生問題'); });
  refreshFriendPetsListener();
}
function refreshFriendPetsListener(){
  if(!currentUser) return;
  if(unsubFriendPets) unsubFriendPets();
  const friendIds = Array.from(myFriends).slice(0,30);
  if(friendIds.length===0){
    friendPetsMap = {};
    rebuildAllPets();
    return;
  }
  unsubFriendPets = db.collection('pets').where('ownerId','in',friendIds).onSnapshot(snap=>{
    friendPetsMap = {};
    snap.forEach(d=>{ friendPetsMap[d.id] = {id:d.id, ...d.data()}; });
    rebuildAllPets();
  }, err=>{ console.error(err); toast('讀取好友寵物資料時發生問題'); });
}
function tsToMillis(ts){
  if(!ts) return 0;
  if(ts.toMillis) return ts.toMillis();
  if(ts.seconds) return ts.seconds*1000;
  return 0;
}
function rebuildAllPets(){
  const merged = {...ownPetsMap, ...friendPetsMap};
  allPets = Object.values(merged).sort((a,b)=> tsToMillis(b.createdAt)-tsToMillis(a.createdAt));
  refreshLogListeners();
}

/* Same reasoning as pets: one listener per accessible pet's logs
   subcollection, instead of a single collectionGroup query across everyone. */
function refreshLogListeners(){
  const currentIds = new Set(allPets.map(p=>p.id));
  Object.keys(logListenerUnsubs).forEach(pid=>{
    if(!currentIds.has(pid)){
      logListenerUnsubs[pid]();
      delete logListenerUnsubs[pid];
      delete logsByPet[pid];
    }
  });
  currentIds.forEach(pid=>{
    if(logListenerUnsubs[pid]) return;
    logListenerUnsubs[pid] = db.collection('pets').doc(pid).collection('logs').onSnapshot(snap=>{
      logsByPet[pid] = snap.docs.map(d=>({id:d.id, petId:pid, ...d.data()}));
      rebuildAllLogs();
    }, err=>{ console.error(err); });
  });
  rebuildAllLogs();
}
function rebuildAllLogs(){
  allLogs = Object.values(logsByPet).flat();
  renderCurrentView();
}

function renderCurrentView(){
  if(!currentUser || !currentProfile) return;
  if(!document.getElementById('page')){ renderApp(); return; }
  if(activeTab==='pets'){
    if(view==='detail') renderPetDetail();
    else if(view==='addPet' || view==='editPet') { /* keep form as-is, don't re-render mid-typing */ }
    else renderPetsList();
  } else if(activeTab==='feed'){
    renderLogTimeline();
  } else {
    renderOverviewPage();
  }
}

/* ================= AUTH ================= */
function renderAuth(){
  const isReset = authMode==='reset';
  root.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-hero">
        ${logoImgTag('logo-lg')}
        <h1 class="display">毛孩日誌</h1>
      </div>
      <div class="card">
        <div id="authError"></div>
        ${isReset ? `<p style="font-size:13px;color:var(--ink-soft);margin:0 0 16px;line-height:1.6;">輸入註冊時用的 Email,我們會寄一封重設密碼的信給你。</p>` : ''}
        <div id="registerFields" class="${authMode==='register'?'':'hidden'}">
          <div class="field">
            <label>你是誰？</label>
            <input type="text" id="regName" placeholder="輸入你的名字或暱稱" maxlength="20">
          </div>
          <div class="field">
            <label>邀請碼</label>
            <input type="text" id="regInviteCode" placeholder="輸入邀請碼">
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field ${isReset?'hidden':''}">
          <label>密碼</label>
          <input type="password" id="authPass" placeholder="至少 6 個字元" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="authSubmit">${authMode==='login'?'登入':authMode==='register'?'建立帳號':'寄送重設密碼信'}</button>
        <div class="auth-toggle">
          ${authMode==='login'
            ? `還沒有帳號？<a id="toRegister">建立一個</a> ・ <a id="toReset">忘記密碼？</a>`
            : `已經有帳號了？<a id="toLogin">直接登入</a>`}
        </div>
      </div>
    </div>
  `;
  document.getElementById('authSubmit').onclick = handleAuthSubmit;
  const tr = document.getElementById('toRegister'); if(tr) tr.onclick = ()=>{authMode='register'; renderAuth();};
  const tl = document.getElementById('toLogin'); if(tl) tl.onclick = ()=>{authMode='login'; renderAuth();};
  const trs = document.getElementById('toReset'); if(trs) trs.onclick = ()=>{authMode='reset'; renderAuth();};
}

async function handleAuthSubmit(){
  const email = document.getElementById('authEmail').value.trim();
  const errBox = document.getElementById('authError');
  errBox.innerHTML = '';
  const btn = document.getElementById('authSubmit');
  const btnLabel = authMode==='login'?'登入':authMode==='register'?'建立帳號':'寄送重設密碼信';

  if(authMode==='reset'){
    if(!email){ errBox.innerHTML = `<div class="auth-err">請輸入 Email</div>`; return; }
    btn.disabled = true; btn.textContent = '寄送中…';
    try{
      await auth.sendPasswordResetEmail(email);
      errBox.innerHTML = `<div class="auth-ok">已寄出重設密碼信,請到 ${esc(email)} 收信(記得看一下垃圾郵件匣)。</div>`;
      btn.textContent = '已寄出 ✓';
      setTimeout(()=>{ authMode='login'; renderAuth(); }, 2500);
      return;
    }catch(e){
      const msgMap = {'auth/invalid-email':'Email 格式不正確','auth/user-not-found':'找不到這個 Email 的帳號'};
      errBox.innerHTML = `<div class="auth-err">${msgMap[e.code] || ('發生錯誤：'+e.message)}</div>`;
      btn.disabled = false; btn.textContent = btnLabel;
      return;
    }
  }

  const pass = document.getElementById('authPass').value;
  if(!email || !pass){ errBox.innerHTML = `<div class="auth-err">請輸入 Email 和密碼</div>`; return; }
  btn.disabled = true; btn.textContent = '處理中…';
  try{
    if(authMode==='login'){
      await auth.signInWithEmailAndPassword(email, pass);
    } else {
      const name = document.getElementById('regName').value.trim();
      if(!name){ errBox.innerHTML = `<div class="auth-err">請輸入你的名字或暱稱</div>`; btn.disabled=false; btn.textContent=btnLabel; return; }
      const inviteCode = document.getElementById('regInviteCode').value.trim();
      if(inviteCode !== INVITE_CODE){ errBox.innerHTML = `<div class="auth-err">邀請碼不正確</div>`; btn.disabled=false; btn.textContent=btnLabel; return; }
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const autoColor = await pickAvailableColor(cred.user.uid);
      await db.collection('users').doc(cred.user.uid).set({
        name, email, color: autoColor, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }catch(e){
    const msgMap = {
      'auth/invalid-email':'Email 格式不正確','auth/user-not-found':'找不到這個帳號,請確認 Email 或改成註冊',
      'auth/wrong-password':'密碼不正確','auth/invalid-credential':'Email 或密碼不正確',
      'auth/email-already-in-use':'這個 Email 已經註冊過了,請改成登入','auth/weak-password':'密碼至少需要 6 個字元',
    };
    errBox.innerHTML = `<div class="auth-err">${msgMap[e.code] || ('發生錯誤：'+e.message)}</div>`;
  }
  btn.disabled = false; btn.textContent = btnLabel;
}

        <button class="profile-trigger" id="profileBtn">
          ${currentProfile.avatar ? `<img class="avatar-mini" src="${currentProfile.avatar}">` : `<span class="avatar-mini" style="display:inline-flex;align-items:center;justify-content:center;background:${nameColor(currentUser.uid)};color:#fff;font-size:11px;">${esc((currentProfile.name||'?').slice(0,1))}</span>`}

        <button id="logoutBtn">登出</button>
      </div>
    </div>
    <div id="page" class="page"></div>
    <div class="tabbar"><div class="tabbar-inner">
      <button class="tab ${activeTab==='pets'?'active':''}" data-tab="pets"><span class="ic">🐾</span>我的寵物</button>
      <button class="tab ${activeTab==='feed'?'active':''}" data-tab="feed"><span class="ic">📋</span>紀錄動態</button>
      <button class="tab ${activeTab==='overview'?'active':''}" data-tab="overview"><span class="ic">📊</span>總覽</button>
    </div></div>
  `;
  document.getElementById('logoutBtn').onclick = ()=>auth.signOut();
  document.getElementById('profileBtn').onclick = ()=>openProfileModal();
  document.getElementById('friendsBtn').onclick = ()=>openFriendsModal();
  document.querySelectorAll('.tab').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; view='list'; editingLog=null; renderApp(); };
  });
  if(activeTab==='pets'){
    if(view==='detail') renderPetDetail();
    else renderPetsList();
  } else if(activeTab==='feed'){
    renderLogTimeline();
  } else {
    renderOverviewPage();
  }
}

/* ================= PROFILE MODAL ================= */
function openProfileModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'profileModalOverlay';
  const initialColor = currentProfile.color || nameColor(currentUser.uid);
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head"><h3 class="display">編輯個人資料</h3><button class="modal-close" id="closeProfileModal">✕</button></div>
      <div class="avatar-edit">
        <div class="avatar-preview" id="avatarPreview">${currentProfile.avatar ? `<img src="${currentProfile.avatar}">` : '🙂'}</div>
        <button class="btn-ghost" id="chooseAvatarBtn">上傳頭像</button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
      </div>
      <div class="field"><label>使用者名稱</label><input type="text" id="profileNameInput" value="${esc(currentProfile.name||'')}" maxlength="20"></div>
      <div class="field"><label>代表色</label>
        <div class="color-picker" id="colorPicker">
          ${PALETTE.map(c=>`<button type="button" class="color-swatch ${c===initialColor?'selected':''}" data-color="${c}" style="background:${c}"></button>`).join('')}
        </div>
      </div>
      <div class="submit-row"><button class="btn btn-primary" id="saveProfileBtn">儲存</button></div>
    </div>
  `;
  document.body.appendChild(overlay);
  let newAvatar = currentProfile.avatar || null;
  let selectedColor = initialColor;
  document.getElementById('closeProfileModal').onclick = ()=>overlay.remove();
  overlay.onclick = (ev)=>{ if(ev.target===overlay) overlay.remove(); };
  document.getElementById('chooseAvatarBtn').onclick = ()=>document.getElementById('avatarInput').click();
  document.getElementById('avatarInput').onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, 320/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        newAvatar = canvas.toDataURL('image/jpeg', 0.82);
        document.getElementById('avatarPreview').innerHTML = `<img src="${newAvatar}">`;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  document.getElementById('colorPicker').querySelectorAll('.color-swatch').forEach(sw=>{
    sw.onclick = ()=>{
      selectedColor = sw.dataset.color;
      document.getElementById('colorPicker').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
    };
  });
  document.getElementById('saveProfileBtn').onclick = async ()=>{
    const btn = document.getElementById('saveProfileBtn');
    const name = document.getElementById('profileNameInput').value.trim();
    if(!name){ toast('請輸入名字'); return; }
    btn.disabled = true; btn.textContent = '儲存中…';
    try{
      await db.collection('users').doc(currentUser.uid).update({ name, avatar: newAvatar || null, color: selectedColor });
      currentProfile.name=name; currentProfile.avatar=newAvatar||null; currentProfile.color=selectedColor;
      overlay.remove();
      toast('已更新個人資料 🐾');
      renderApp();
    }catch(e){
      console.error(e); toast('更新失敗：'+e.message);
      btn.disabled=false; btn.textContent='儲存';
    }
  };
}

    </div>
    ${sentInvites.length>0 ? `

        <div class="friends-section-title">已送出、等待中的邀請</div>

  document.getElementById('sendInviteBtn').onclick = sendInvite;

async function sendInvite(){
  const btn = document.getElementById('sendInviteBtn');
  const input = document.getElementById('inviteEmail');
  const email = input.value.trim().toLowerCase();
  if(!email){ toast('請輸入 Email'); return; }
  if(email === (currentUser.email||'').toLowerCase()){ toast('不能邀請自己'); return; }
  const already = allUsers.find(u=>myFriends.has(u.uid) && (u.email||'').toLowerCase()===email);
  if(already){ toast('你們已經是好友了'); return; }
  if(sentInvites.find(inv=>inv.toEmail===email)){ toast('已經邀請過這個 Email 了,還在等待對方接受'); return; }
  btn.disabled = true; btn.textContent = '確認中…';
  try{
    const userSnap = await db.collection('users').where('email','==',email).limit(1).get();
    if(userSnap.empty){ toast('這個 Email 還沒有註冊帳號,請先請對方註冊再邀請'); btn.disabled=false; btn.textContent='送出邀請'; return; }
    btn.textContent = '送出中…';
    await db.collection('invites').add({
      fromUid: currentUser.uid, fromName: currentProfile.name, toEmail: email,
      status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('邀請已送出,等對方登入接受 💌');
    input.value = '';
  }catch(e){ console.error(e); toast('送出失敗：'+e.message); }
  btn.disabled = false; btn.textContent = '送出邀請';
}
async function acceptInvite(inviteId){
  const invite = pendingInvitesToMe.find(x=>x.id===inviteId);
  if(!invite) return;
  try{
    const batch = db.batch();
    batch.set(db.collection('users').doc(invite.fromUid).collection('friends').doc(currentUser.uid), {since: firebase.firestore.FieldValue.serverTimestamp()});
    batch.set(db.collection('users').doc(currentUser.uid).collection('friends').doc(invite.fromUid), {since: firebase.firestore.FieldValue.serverTimestamp()});
    batch.update(db.collection('invites').doc(inviteId), {status:'accepted'});
    await batch.commit();
    toast(`你和 ${invite.fromName} 現在是好友了 🎉`);
  }catch(e){ console.error(e); toast('操作失敗：'+e.message); }
}
async function declineInvite(inviteId){
  try{ await db.collection('invites').doc(inviteId).update({status:'declined'}); }
  catch(e){ toast('操作失敗：'+e.message); }
}
async function revokeInvite(inviteId){
  try{ await db.collection('invites').doc(inviteId).delete(); toast('已收回邀請'); }
  catch(e){ toast('操作失敗：'+e.message); }
}
async function removeFriend(otherUid, otherName){
  if(!confirm(`確定要把「${otherName}」從好友移除嗎？之後就不會再看到彼此的寵物了。`)) return;
  try{
    const batch = db.batch();
    batch.delete(db.collection('users').doc(currentUser.uid).collection('friends').doc(otherUid));
    batch.delete(db.collection('users').doc(otherUid).collection('friends').doc(currentUser.uid));
    await batch.commit();
    toast('已移除好友');
  }catch(e){ console.error(e); toast('操作失敗：'+e.message); }
}

function bindLogPhotoBox(){
  const box = document.getElementById('logPhotoBox');
  const fileInput = document.getElementById('lg_photo');
  if(!box || !fileInput) return;
  box.onclick = ()=>fileInput.click();
  fileInput.onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, 800/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        logPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.6);
        box.classList.add('has-img');
        box.innerHTML = `<img src="${logPhotoDataUrl}"><button class="photo-remove" id="removeLogPhoto">✕</button>`;
        document.getElementById('removeLogPhoto').onclick = (ev2)=>{
          ev2.stopPropagation(); logPhotoDataUrl=null;
          box.classList.remove('has-img');
          box.innerHTML = `<div class="placeholder"><span class="ic">📷</span>拍照或選擇照片</div>`;
        };
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const rm = document.getElementById('removeLogPhoto');
  if(rm) rm.onclick = (ev2)=>{
    ev2.stopPropagation(); logPhotoDataUrl=null;
    box.classList.remove('has-img');
    box.innerHTML = `<div class="placeholder"><span class="ic">📷</span>拍照或選擇照片</div>`;
  };
}

function renderLogGroups(logs, showPetName){
  const byDate = {};
  logs.forEach(f=>{ (byDate[f.date]=byDate[f.date]||[]).push(f); });
  const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  return dates.map(date=>`
    <div class="day-group">
      <div class="day-label">${formatDate(date)}</div>
      ${byDate[date].sort((a,b)=>b.time.localeCompare(a.time)).map(f=>logCardHtml(f, showPetName)).join('')}
    </div>
  `).join('');
}
function logCardHtml(f, showPetName){
  const pet = allPets.find(p=>p.id===f.petId);
  const mine = f.uid === (currentUser && currentUser.uid);
  const canEdit = mine || (pet && hasAccess(pet.ownerId));
  const t = f.type || 'meal';
  let titleHtml, subHtml = '';
  if(t==='meal'){
    titleHtml = `<div class="feed-food">${esc(f.food||'')}</div>`;
    const bits = [];
    if(f.amountValue!=null && f.amountValue!==''){
      bits.push(`份量：${f.amountValue}${f.amountUnit==='罐' ? ' 罐'+(f.canSize? `（${f.canSize}g/罐）` : '') : 'g'}`);
    } else if(f.amount){
      bits.push(`份量：${esc(f.amount)}`);
    }
    if(f.leftover) bits.push(`剩：${esc(f.leftover)}`);
    if(bits.length) subHtml += `<div class="feed-amount">${bits.join(' ・ ')}</div>`;
    const nutriBits = [];
    if(f.calories!=null && f.calories!=='') nutriBits.push(`${f.calories} kcal`);
    if(f.protein!=null && f.protein!=='') nutriBits.push(`蛋白質 ${f.protein}g`);
    if(nutriBits.length) subHtml += `<div class="feed-amount">${nutriBits.join(' ・ ')}</div>`;
    if(f.rating) subHtml += `<div class="log-stars">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</div>`;
  } else if(t==='vet'){
    titleHtml = `<div class="feed-food">${esc(f.content||'')}</div>`;
  } else if(t==='med'){
    titleHtml = `<div class="feed-food">${esc(f.medName||'')}${f.dosage? ' · '+esc(f.dosage):''}</div>`;
  } else {
    titleHtml = `<div class="feed-food">${esc(f.category||'其他')}${f.content? '：'+esc(f.content):''}</div>`;
  }
  const iconHtml = f.photo
    ? `<img class="feed-icon" src="${f.photo}" style="object-fit:cover;">`
    : `<div class="feed-icon type-${t}">${LOG_TYPE_ICON[t]}</div>`;
  return `
    <div class="feed-card">
      ${iconHtml}
      <div class="feed-body">
        <div class="feed-top">
          <span class="badge" style="background:${nameColor(f.uid)}22;color:${nameColor(f.uid)}">${esc(f.name)}</span>
          <span class="type-tag type-${t}">${LOG_TYPE_LABEL[t]}</span>
          <span class="time-tag">${esc(f.time||'')}</span>
          ${showPetName && pet ? `<span class="pet-tag" style="background:${petColor(pet.id)}22;color:${petColor(pet.id)}">${esc(pet.name)}</span>` : ''}
          ${f.cost ? `<span class="log-cost">💰 NT$${f.cost}</span>` : ''}
        </div>
        ${titleHtml}
        ${subHtml}
        ${f.note ? `<div class="feed-note">${esc(f.note)}</div>` : ''}
        ${canEdit ? `<div class="feed-actions"><button class="edit-btn" data-fid="${f.id}" data-pid="${f.petId}">編輯</button><button class="del-btn" data-fid="${f.id}" data-pid="${f.petId}">刪除</button></div>` : ''}
      </div>
    </div>
  `;
}

function formatDate(d){
  const dt = new Date(d+'T00:00:00');
  const days = ['週日','週一','週二','週三','週四','週五','週六'];
  return `${dt.getMonth()+1}月${dt.getDate()}日 · ${days[dt.getDay()]}`;
}

async function submitLog(petId, type){
  const btn = document.getElementById('submitLog');
  const date = document.getElementById('lg_date').value;
  const time = document.getElementById('lg_time').value;
  if(!date || !time){ toast('請選擇日期和時間'); return; }
  const isEdit = !!editingLog;
  const costVal = document.getElementById('lg_cost').value;
  const data = {
    type, date, time,
    cost: costVal===''? null : Number(costVal),
    note: document.getElementById('lg_note').value.trim(),
  };
  if(!isEdit){
    data.uid = currentUser.uid;
    data.name = currentProfile.name;
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  }
  if(type==='meal'){
    const food = document.getElementById('lg_food').value.trim();
    if(!food){ toast('請填寫吃了什麼'); return; }
    const amtValRaw = document.getElementById('lg_amountval').value;
    const unit = document.getElementById('lg_amountunit').value;
    const canSizeRaw = document.getElementById('lg_cansize').value;
    const calRaw = document.getElementById('lg_calories').value;
    const proRaw = document.getElementById('lg_protein').value;
    data.food = food;
    data.amount = null; // legacy field, superseded by amountValue/amountUnit
    data.amountValue = amtValRaw===''? null : Number(amtValRaw);
    data.amountUnit = unit;
    data.canSize = (unit==='罐' && canSizeRaw!=='') ? Number(canSizeRaw) : null;
    data.leftover = document.getElementById('lg_leftover').value;
    data.rating = mealRatingValue || 0;
    data.calories = calRaw===''? null : Number(calRaw);
    data.protein = proRaw===''? null : Number(proRaw);
    data.photo = logPhotoDataUrl || null;
  } else if(type==='vet'){
    const content = document.getElementById('lg_content').value.trim();
    if(!content){ toast('請填寫看診內容'); return; }
    data.content = content;
  } else if(type==='med'){
    const medName = document.getElementById('lg_medname').value.trim();
    if(!medName){ toast('請填寫藥品名稱'); return; }
    data.medName = medName;
    data.dosage = document.getElementById('lg_dosage').value.trim();
  } else {
    const category = document.getElementById('lg_category').value.trim();
    if(!category){ toast('請填寫類別'); return; }
    data.category = category;
    data.content = document.getElementById('lg_content').value.trim();
    data.photo = logPhotoDataUrl || null;
  }
  btn.disabled = true; btn.textContent = isEdit? '更新中…':'儲存中…';
  try{
    if(isEdit){
      await db.collection('pets').doc(petId).collection('logs').doc(editingLog.id).update(data);
      logsByPet[petId] = (logsByPet[petId]||[]).map(l=> l.id===editingLog.id ? {...l, ...data} : l);
      rebuildAllLogs();
      toast('已更新這筆紀錄 ' + LOG_TYPE_ICON[type]);
      editingLog = null;
      renderPetDetail();
    } else {
      const ref = await db.collection('pets').doc(petId).collection('logs').add(data);
      logsByPet[petId] = [...(logsByPet[petId]||[]), {id:ref.id, petId, ...data}];
      rebuildAllLogs();
      toast('已儲存這筆紀錄 ' + LOG_TYPE_ICON[type]);
      renderPetDetail();
    }
  }catch(e){
    console.error(e); toast('儲存失敗：'+e.message);
    btn.disabled = false; btn.textContent = isEdit? '更新':'儲存';
  }
}
async function deleteLog(petId, logId){
  if(!confirm('確定要刪除這筆紀錄嗎？')) return;
  try{
    await db.collection('pets').doc(petId).collection('logs').doc(logId).delete();
    toast('已刪除');
  }catch(e){ toast('刪除失敗：'+e.message); }
}

      data.ownerId = currentUser.uid;
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('pets').add(data);
      ownPetsMap[ref.id] = {id:ref.id, ...data};
      rebuildAllPets();
      toast('已新增寵物 🎉');
      selectedPetId = ref.id; view='detail';
      renderPetDetail();
    }
  }catch(e){
    console.error(e); toast('儲存失敗：'+e.message);
    btn.disabled = false; btn.textContent = isEdit? '更新寵物資料':'儲存這隻寵物';
  }
}

async function deletePet(p){
  if(!confirm(`確定要刪除「${p.name}」嗎？相關的照護紀錄也會一併刪除,無法復原。`)) return;
  try{
    const logsSnap = await db.collection('pets').doc(p.id).collection('logs').get();
    if(!logsSnap.empty){
      const batch = db.batch();
      logsSnap.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
    await db.collection('pets').doc(p.id).delete();
    toast('已刪除');
    view='list'; renderPetsList();
  }catch(e){ console.error(e); toast('刪除失敗：'+e.message); }
}

/* ================= LOG TIMELINE ================= */
let timelineTypeFilter = '';
let timelinePetFilter = '';
function renderLogTimeline(){
  const page = document.getElementById('page');
  if(!page) return;
  const pets = visiblePets();
  const petIds = new Set(pets.map(p=>p.id));
  if(timelinePetFilter && !petIds.has(timelinePetFilter)) timelinePetFilter = '';
  let logs = allLogs.filter(f=>petIds.has(f.petId));
  if(timelinePetFilter) logs = logs.filter(f=>f.petId===timelinePetFilter);
  if(timelineTypeFilter) logs = logs.filter(f=>(f.type||'meal')===timelineTypeFilter);

  if(pets.length===0){
    page.innerHTML = `<div class="empty-state"><span class="ic">📋</span>還沒有寵物<br>先到「我的寵物」新增一隻吧</div>`;
    return;
  }
  page.innerHTML = `
    <div class="section-title">紀錄動態</div>
    <div class="feed-quick">
      <select id="quickPetSel">${pets.map(p=>`<option value="${p.id}" ${feedQuickPetId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select>
      <button class="add-fab" id="quickAddBtn" style="white-space:nowrap;">＋ 新增紀錄</button>
    </div>
    <div class="type-filter">
      <button class="chip ${!timelinePetFilter?'active':''}" data-pet="">全部寵物</button>
      ${pets.map(p=>`<button class="chip ${timelinePetFilter===p.id?'active':''}" data-pet="${p.id}" style="${timelinePetFilter===p.id?`background:${petColor(p.id)};border-color:${petColor(p.id)}`:''}">${esc(p.name)}</button>`).join('')}
    </div>
    <div class="type-filter">
      <button class="chip ${!timelineTypeFilter?'active':''}" data-type="">全部類型</button>
      ${LOG_TYPES.map(t=>`<button class="chip ${timelineTypeFilter===t?'active':''}" data-type="${t}">${LOG_TYPE_ICON[t]} ${LOG_TYPE_LABEL[t]}</button>`).join('')}
    </div>
    ${logs.length===0 ? `<div class="empty-state"><span class="ic">📋</span>還沒有任何紀錄</div>` : renderLogGroups(logs, !timelinePetFilter)}
  `;
  document.getElementById('quickAddBtn').onclick = ()=>{
    const sel = document.getElementById('quickPetSel');
    selectedPetId = sel.value; feedQuickPetId = sel.value;
    activeTab = 'pets'; view = 'detail';
    renderApp();
  };
  page.querySelectorAll('.type-filter .chip[data-pet]').forEach(b=>{
    b.onclick = ()=>{ timelinePetFilter = b.dataset.pet; renderLogTimeline(); };
  });
  page.querySelectorAll('.type-filter .chip[data-type]').forEach(b=>{
    b.onclick = ()=>{ timelineTypeFilter = b.dataset.type; renderLogTimeline(); };
  });
  bindFeedDeleteButtons(page);
}

/* ================= OVERVIEW ================= */
let overviewRange = 'month'; // 'month' | 'year'
let overviewPetFilter = '';
let overviewDate = new Date();

function isInOverviewRange(dateStr){
  if(!dateStr) return false;
  const y = dateStr.slice(0,4), m = dateStr.slice(5,7);
  const oy = String(overviewDate.getFullYear());
  const om = String(overviewDate.getMonth()+1).padStart(2,'0');
  if(overviewRange==='year') return y===oy;
  return y===oy && m===om;
}
function overviewRangeLabel(){
  return overviewRange==='year'
    ? `${overviewDate.getFullYear()}年`
    : `${overviewDate.getFullYear()}年${overviewDate.getMonth()+1}月`;
}
function shiftOverviewDate(dir){
  const d = new Date(overviewDate);
  if(overviewRange==='year') d.setFullYear(d.getFullYear()+dir);
  else d.setMonth(d.getMonth()+dir);
  overviewDate = d;
}

function renderOverviewPage(){
  const page = document.getElementById('page');
  if(!page) return;
  const pets = visiblePets();
  if(pets.length===0){
    page.innerHTML = `<div class="empty-state"><span class="ic">📊</span>還沒有寵物<br>先到「我的寵物」新增一隻吧</div>`;
    return;
  }
  if(overviewPetFilter && !pets.find(p=>p.id===overviewPetFilter)) overviewPetFilter = '';
  const scopedPetIds = overviewPetFilter ? [overviewPetFilter] : pets.map(p=>p.id);
  const scopedPetIdSet = new Set(scopedPetIds);
  const logs = allLogs.filter(l=>scopedPetIdSet.has(l.petId) && isInOverviewRange(l.date));

  const totalCost = logs.reduce((sum,l)=>sum+(l.cost||0),0);
  const byType = {};
  LOG_TYPES.forEach(t=>byType[t]={cost:0,count:0});
  logs.forEach(l=>{
    const t = l.type||'meal';
    if(!byType[t]) byType[t]={cost:0,count:0};
    byType[t].cost += (l.cost||0);
    byType[t].count += 1;
  });
  const maxTypeCost = Math.max(1, ...LOG_TYPES.map(t=>byType[t].cost));

  const byPet = {};
  pets.forEach(p=>byPet[p.id]={cost:0,count:0});
  logs.forEach(l=>{
    if(!byPet[l.petId]) byPet[l.petId]={cost:0,count:0};
    byPet[l.petId].cost += (l.cost||0);
    byPet[l.petId].count += 1;
  });

  page.innerHTML = `
    <div class="section-title">總覽統計</div>
    <div class="type-filter">
      <button class="chip ${!overviewPetFilter?'active':''}" data-pet="">全部寵物</button>
      ${pets.map(p=>`<button class="chip ${overviewPetFilter===p.id?'active':''}" data-pet="${p.id}" style="${overviewPetFilter===p.id?`background:${petColor(p.id)};border-color:${petColor(p.id)}`:''}">${esc(p.name)}</button>`).join('')}
    </div>
    <div class="seg">
      <button class="${overviewRange==='month'?'active':''}" data-range="month">按月統計</button>
      <button class="${overviewRange==='year'?'active':''}" data-range="year">按年統計</button>
    </div>
    <div class="range-nav">
      <button id="rangePrev">‹</button>
      <span class="lbl">${overviewRangeLabel()}</span>
      <button id="rangeNext">›</button>
    </div>
    <div class="overview-total">
      <div class="amt">NT$ ${totalCost.toLocaleString()}</div>
      <div class="lbl">${overviewPetFilter? esc(pets.find(p=>p.id===overviewPetFilter).name) : '全部寵物'}・${overviewRangeLabel()}總花費・共 ${logs.length} 筆紀錄</div>
    </div>

    <div class="section-title">依類別分布</div>
    <div class="form-card" style="margin-bottom:16px;">
      ${LOG_TYPES.map(t=>`
        <div class="type-bar-row">
          <div class="row-head"><span class="name">${LOG_TYPE_ICON[t]} ${LOG_TYPE_LABEL[t]}</span><span class="val">NT$ ${byType[t].cost.toLocaleString()}（${byType[t].count} 筆）</span></div>
          <div class="type-bar-track"><div class="type-bar-fill" style="width:${Math.round(byType[t].cost/maxTypeCost*100)}%;background:${typeColor(t)}"></div></div>
        </div>
      `).join('')}
    </div>

    ${!overviewPetFilter && pets.length>1 ? `
      <div class="section-title">依寵物分布</div>
      <div class="form-card">
        ${pets.map(p=>`
          <div class="pet-breakdown-row">
            <span class="pname"><span class="pet-color-dot" style="background:${petColor(p.id)}"></span>${p.photo?`<img src="${p.photo}">`:SPECIES_ICON[p.species]||'🐾'} ${esc(p.name)}</span>
            <span class="pval">NT$ ${byPet[p.id].cost.toLocaleString()}（${byPet[p.id].count} 筆）</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
  page.querySelectorAll('.type-filter .chip').forEach(b=>{
    b.onclick = ()=>{ overviewPetFilter = b.dataset.pet; renderOverviewPage(); };
  });
  page.querySelectorAll('.seg button').forEach(b=>{
    b.onclick = ()=>{ overviewRange = b.dataset.range; renderOverviewPage(); };
  });
  document.getElementById('rangePrev').onclick = ()=>{ shiftOverviewDate(-1); renderOverviewPage(); };
  document.getElementById('rangeNext').onclick = ()=>{ shiftOverviewDate(1); renderOverviewPage(); };
}
function typeColor(t){
  return {meal:'var(--clay)', vet:'#7D5BA6', med:'var(--honey)', other:'var(--moss)'}[t] || 'var(--moss)';
}

root.innerHTML = `<div class="loading">載入中…</div>`;
</script>
